name: ci

on:
    push:
        branches:
            - main
            - master
    pull_request:

jobs:
    lint-and-typecheck:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.15.1

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: /Users/turou/Documents/GitHub/TemotoAlign/pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile
              working-directory: /Users/turou/Documents/GitHub/TemotoAlign

            - name: Lint
              run: pnpm lint
              working-directory: /Users/turou/Documents/GitHub/TemotoAlign

            - name: Typecheck
              run: pnpm typecheck
              working-directory: /Users/turou/Documents/GitHub/TemotoAlign

            - name: Build
              run: pnpm build
              working-directory: /Users/turou/Documents/GitHub/TemotoAlign

    capacitor-smoke:
        runs-on: macos-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.15.1

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: /Users/turou/Documents/GitHub/TemotoAlign/pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile
              working-directory: /Users/turou/Documents/GitHub/TemotoAlign

            - name: Generate web build
              run: pnpm build
              working-directory: /Users/turou/Documents/GitHub/TemotoAlign

            - name: Capacitor sync
              run: pnpm capacitor:sync
              working-directory: /Users/turou/Documents/GitHub/TemotoAlign
